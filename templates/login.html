<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - SmartPark</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
    font-family:'Segoe UI',sans-serif;
    background:url("https://images.unsplash.com/photo-1503376780353-7e6692767b70") center/cover no-repeat;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

/* 🔥 Overlay */
body::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.65);
    z-index:0;
}

/* LOGIN BOX */
.login-box{
    position:relative;
    z-index:1;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    padding:35px;
    border-radius:20px;
    width:400px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    color:white;
    transition:0.3s;
}

/* 🔥 Hover */
.login-box:hover{
    transform:translateY(-5px);
    box-shadow:0 0 25px rgba(99,102,241,0.7);
}

/* LOGO */
.logo{
    text-align:center;
    margin-bottom:15px;
}

.logo i{
    font-size:45px;
    color:white;
    text-shadow:0 0 10px rgba(255,255,255,0.8);
}

/* TITLE */
.login-box h3{
    text-align:center;
    margin-bottom:25px;
    font-weight:600;
}

/* INPUT */
.form-control{
    border-radius:10px;
    background:rgba(255,255,255,0.2);
    border:none;
    color:white;
}

.form-control::placeholder{
    color:#e5e7eb;
}

.form-control:focus{
    background:rgba(255,255,255,0.3);
    color:white;
    box-shadow:none;
    border:1px solid #6366f1;
}

/* BUTTON */
.btn-login{
    background:linear-gradient(135deg,#6366f1,#8b5cf6);
    color:white;
    border:none;
    border-radius:25px;
    padding:10px;
    font-weight:500;
    transition:0.3s;
}

.btn-login:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px rgba(139,92,246,0.8);
}

/* LINKS */
.register-link{
    text-align:center;
    margin-top:18px;
}

.register-link p{
    margin-bottom:8px;
}

.register-link a{
    color:#c4b5fd;
    text-decoration:none;
    transition:0.3s;
}

.register-link a:hover{
    text-decoration:underline;
    color:white;
}

/* BACK HOME */
.back-home{
    font-size:14px;
    color:#e5e7eb;
}

.back-home i{
    margin-right:6px;
    color:#93c5fd;
}

</style>
</head>

<body>

<div class="login-box">

    <div class="logo">
        <i class="fa fa-square-parking"></i>
    </div>

    <h3>Login</h3>

    <form method="POST" action="/login">

        <input type="email" 
               name="email" 
               class="form-control mb-3" 
               placeholder="Email Address" 
               required>

        <input type="password" 
               name="password" 
               class="form-control mb-3" 
               placeholder="Password" 
               required>

        <button class="btn btn-login w-100">
            Login
        </button>

    </form>

    <div class="register-link">
        <p>
            Don't have an account? 
            <a href="/register">Register</a>
        </p>

        <p class="back-home">
            <i class="fa fa-arrow-left"></i>
            <a href="/">Back to Homepage</a>
        </p>
    </div>

</div>

</body>
</html>
