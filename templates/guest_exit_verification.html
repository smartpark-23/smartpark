<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMARTPARK | Exit Verification</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            background:
                linear-gradient(rgba(10,15,30,0.72), rgba(10,15,30,0.78)),
                url('https://images.unsplash.com/photo-1503736334956-4c8f8e92946d?auto=format&fit=crop&w=1600&q=80');
            background-size:cover;
            background-position:center;
            color:white;
        }

        .wrapper{
            min-height:100vh;
        }

        /* NAVBAR */
        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:22px 60px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(16px);
            border-bottom:1px solid rgba(255,255,255,0.12);
            box-shadow:0 6px 20px rgba(0,0,0,0.25);
        }

        .logo{
            font-size:30px;
            font-weight:700;
            letter-spacing:1px;
        }

        .nav-links a{
            text-decoration:none;
            color:white;
            margin-left:18px;
            padding:12px 18px;
            border-radius:14px;
            transition:0.3s ease;
            font-weight:500;
        }

        .nav-links a:hover{
            background:rgba(255,255,255,0.15);
            transform:translateY(-2px);
        }

        /* MAIN FORM */
        .form-container{
            display:flex;
            justify-content:center;
            align-items:center;
            padding:50px 20px;
        }

        .glass-card{
            width:100%;
            max-width:600px;
            background:rgba(255,255,255,0.10);
            backdrop-filter:blur(18px);
            border-radius:28px;
            padding:35px;
            box-shadow:0 12px 35px rgba(0,0,0,0.35);
            border:1px solid rgba(255,255,255,0.08);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            font-weight:600;
        }

        .form-control{
            background:rgba(255,255,255,0.12);
            border:none;
            color:white;
            padding:14px;
            border-radius:14px;
            margin-bottom:18px;
        }

        .form-control::placeholder{
            color:#d1d5db;
        }

        .btn-submit{
            width:100%;
            background:#3b82f6;
            border:none;
            padding:14px;
            border-radius:14px;
            color:white;
            font-weight:600;
            transition:0.3s;
        }

        .btn-submit:hover{
            background:#2563eb;
        }

        .success-box{
            margin-top:18px;
            padding:14px;
            border-radius:14px;
            background:rgba(34,197,94,0.18);
            color:#4ade80;
        }

        .error-box{
            margin-top:18px;
            padding:14px;
            border-radius:14px;
            background:rgba(239,68,68,0.18);
            color:#f87171;
        }
    </style>
</head>
<body>

<div class="wrapper">

    <!-- NAVBAR -->
    <div class="header">
        <div class="logo">SMARTPARK</div>

       <div class="nav-links">
            <a href="/">Home</a>
            <a href="/slots">Slots</a>
            <a href="/guest-parking">Guest Parking</a>
            <a href="/guest-access">Track Request</a>
            <a href="/login">Login</a>
            <a href="/register" class="register-btn">Register</a>
        </div>
    </div>

    <!-- FORM -->
    <div class="form-container">
        <div class="glass-card">

            <h2>🚗 Exit Verification</h2>

            <form method="POST" enctype="multipart/form-data">

                <input type="text"
                       name="vehicle_no"
                       class="form-control"
                       placeholder="Enter Vehicle Number"
                       required>

                <input type="text"
                       name="vehicle_type"
                       class="form-control"
                       placeholder="Enter Vehicle Type"
                       required>

                <input type="text"
                       name="slot_number"
                       class="form-control"
                       placeholder="Enter Slot Number"
                       required>

                <label class="mb-2">Upload Receipt PDF</label>
                <input type="file"
                       name="receipt_pdf"
                       class="form-control"
                       accept=".pdf"
                       required>

                <button type="submit" class="btn-submit">
                    Verify & Exit
                </button>
            </form>

            {% if success %}
                <div class="success-box">
                    {{ success }}
                </div>
            {% endif %}

            {% if error %}
                <div class="error-box">
                    {{ error }}
                </div>
            {% endif %}

        </div>
    </div>

</div>

</body>
</html>
