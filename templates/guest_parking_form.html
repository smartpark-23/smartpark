<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMARTPARK | Guest Parking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:url("https://images.unsplash.com/photo-1506521781263-d8422e82f27a?auto=format&fit=crop&w=1600&q=80") no-repeat center center/cover;
    min-height:100vh;
    font-family:'Segoe UI';
    position:relative;
    color:white;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.65);
    z-index:0;
}

.wrapper{
    position:relative;
    z-index:1;
}

/* NAVBAR */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 50px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
}

.logo{
    font-size:28px;
    font-weight:700;
}

.nav-links a{
    text-decoration:none;
    color:white;
    margin-left:18px;
    padding:8px 14px;
    border-radius:10px;
    transition:0.3s;
}

.nav-links a:hover{
    background:rgba(255,255,255,0.12);
}

/* FORM */
.form-section{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:85vh;
    padding:20px;
}

.form-box{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(18px);
    padding:30px;
    border-radius:22px;
    width:100%;
    max-width:520px;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

.form-title{
    font-size:28px;
    font-weight:700;
    margin-bottom:20px;
    text-align:center;
}

.form-control, .form-select{
    background:rgba(255,255,255,0.15);
    border:none;
    color:white;
    padding:14px;
    border-radius:12px;
}

.form-control::placeholder{
    color:#e5e7eb;
}

.form-select option{
    color:black;
}

.slot-box{
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:15px;
    margin-bottom:18px;
    max-height:150px;
    overflow-y:auto;
}

.form-check{
    margin-bottom:10px;
}

.btn-send{
    background:#22c55e;
    color:white;
    font-weight:600;
    border:none;
    padding:14px;
    border-radius:12px;
}
</style>
</head>
<body>

<div class="wrapper">

    <!-- NAVBAR -->
    <div class="header">
        <div class="logo">SMARTPARK</div>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/slots">Slots</a>
            <a href="/guest-parking">Guest Parking</a>
            <a href="/guest-access">Track Request</a>
            <a href="/login">Login</a>
            <a href="/register" class="register-btn">Register</a>
        </div>
    </div>

    <!-- FORM -->
    <div class="form-section">
        <div class="form-box">

            <div class="form-title">
                🚗 Guest Parking Request
            </div>

            <form method="POST">

                <input type="text" name="guest_name"
                    class="form-control mb-3"
                    placeholder="Guest Name" required>

                <input type="text" name="mobile_number"
                    class="form-control mb-3"
                    placeholder="Mobile Number" required>

                <input type="text" name="vehicle_number"
                    class="form-control mb-3"
                    placeholder="Vehicle Number" required>

                <input type="text" name="resident_name"
                    class="form-control mb-3"
                    placeholder="Resident Name / Flat No" required>

                <input type="date" name="visit_date"
                    class="form-control mb-3" required>

                <!-- SLOT TYPE -->
                <select class="form-select mb-3" id="slotType">
                    <option value="">Select Slot Type</option>
                    <option value="Car">Car</option>
                    <option value="Bike">Bike</option>
                </select>

                <!-- SLOT CHECKBOXES -->
                <div class="slot-box" id="slotContainer">
                    {% for slot in free_slots %}
                        <div class="form-check slot-item"
                             data-type="{{ slot.slot_type }}"
                             style="display:none;">

                            <input class="form-check-input"
                                   type="checkbox"
                                   name="selected_slots"
                                   value="{{ slot.slot_number }}">

                            <label class="form-check-label">
                                {{ slot.slot_number }}
                                ({{ slot.slot_type }})
                            </label>
                        </div>
                    {% endfor %}
                </div>

                <button class="btn btn-send w-100">
                    Send Request
                </button>

            </form>

        </div>
    </div>

</div>

<script>
document.getElementById("slotType").addEventListener("change", function() {
    let selectedType = this.value;
    let slots = document.querySelectorAll(".slot-item");

    slots.forEach(slot => {
        if (slot.getAttribute("data-type") === selectedType) {
            slot.style.display = "block";
        } else {
            slot.style.display = "none";
        }
    });
});
</script>

</body>
</html>
