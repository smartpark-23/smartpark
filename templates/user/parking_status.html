<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Parking Status</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:url("https://images.unsplash.com/photo-1570129477492-45c003edd2be") center/cover no-repeat;
min-height:100vh;
font-family:'Segoe UI';
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

/* 🔥 Overlay */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:0;
}

/* 🔥 Glass Card */
.box{
position:relative;
z-index:1;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:35px;
border-radius:20px;
width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
text-align:center;
color:white;
transition:0.3s;
}

.box:hover{
transform:scale(1.03);
}

/* HEADER */
.box h4{
font-weight:600;
margin-bottom:20px;
}

/* STATUS */
.status{
font-size:20px;
font-weight:bold;
margin-top:15px;
padding:10px;
border-radius:10px;
}

/* ACTIVE */
.active{
background:rgba(34,197,94,0.2);
color:#22c55e;
}

/* NOT ACTIVE */
.inactive{
background:rgba(239,68,68,0.2);
color:#ef4444;
}

/* BUTTON */
.btn-back{
margin-top:20px;
background:white;
color:#4f46e5;
border:none;
border-radius:25px;
padding:10px 20px;
font-weight:500;
transition:0.3s;
}

.btn-back:hover{
background:#e0e7ff;
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="box">

<h4>🚗 My Slots </h4>

{% if slot %}

<p><strong>Slot:</strong> {{ slot.slot_number }}</p>
<p><strong>Vehicle:</strong> {{ slot.vehicle_number }}</p>

<div class="status active">
✔ Parking Slot 
</div>

{% else %}

<div class="status inactive">
❌ No Parking Slot Allocated
</div>

{% endif %}

<a href="/user/home" class="btn btn-back">⬅ Back</a>

</div>

</body>
</html>
