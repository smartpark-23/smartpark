<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Parking Slot</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:url("https://images.unsplash.com/photo-1503376780353-7e6692767b70") no-repeat center/cover;
min-height:100vh;
font-family:'Segoe UI';
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:0;
}

.container-box{
position:relative;
z-index:1;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
width:100%;
max-width:700px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
color:white;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.slot{
padding:15px;
border-radius:12px;
text-align:center;
cursor:pointer;
border:2px solid rgba(255,255,255,0.3);
transition:0.3s;
font-weight:500;
}

.slot:hover{
background:rgba(255,255,255,0.2);
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="container-box">

<div class="header">
<h4>🚗 Book Parking Slot</h4>
<a href="/user/home" class="btn btn-back btn-sm">⬅ Back</a>
</div>

<!-- 🔥 FILTER SAME -->
<form method="GET" class="mb-3">
<select name="type" class="form-control" onchange="this.form.submit()">
<option value="">All Slots</option>
<option value="Car" {% if selected_type == "Car" %}selected{% endif %}>Car</option>
<option value="Bike" {% if selected_type == "Bike" %}selected{% endif %}>Bike</option>
</select>
</form>

<!-- 🔥 SLOT GRID -->
<div class="row g-3">

{% for slot in slots %}

<div class="col-md-3">
<div class="slot"
onclick="openModal('{{ slot.slot_number }}')">
{{ slot.slot_number }}
</div>
</div>

{% endfor %}

</div>

</div>

<!-- 🔥 MODAL (NEW ADD) -->
<div class="modal fade" id="bookModal">
<div class="modal-dialog">
<div class="modal-content">

<form method="POST">

<div class="modal-header">
<h5>Confirm Booking</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<p><b>Slot:</b> <span id="slotName"></span></p>

<input type="hidden" name="slot_number" id="slotInput">

<select name="vehicle_number" class="form-control mt-3" required>
<option value="">Select Vehicle</option>

{% for v in vehicles %}
<option value="{{ v.vehicle_number }}">
{{ v.vehicle_number }} ({{ v.vehicle_type }})
</option>
{% endfor %}

</select>

</div>

<div class="modal-footer">
<button class="btn btn-success">Send Request</button>
<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
Cancel
</button>
</div>

</form>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

function openModal(slot){

document.getElementById("slotName").innerText = slot;
document.getElementById("slotInput").value = slot;

new bootstrap.Modal(document.getElementById('bookModal')).show();

}

</script>

</body>
</html>
