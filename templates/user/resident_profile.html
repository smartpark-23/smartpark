<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resident Profile | SmartPark</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>
body{
    min-height:100vh;
    margin:0;
    background:url("https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat fixed;
    color:white;
    font-family:'Poppins', 'Segoe UI', sans-serif;
}

/* full page overlay */
.overlay{
    min-height:100vh;
    width:100%;
    background:rgba(0,0,0,0.68);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

/* main card */
.profile-box{
    width:100%;
    max-width:780px;
    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(18px);
    padding:45px;
    border-radius:26px;
    box-shadow:0 12px 35px rgba(0,0,0,0.35);
    text-align:center;
    transition:all 0.35s ease;
    border:1px solid rgba(255,255,255,0.12);
}

.profile-box:hover{
    transform:translateY(-6px);
    box-shadow:0 18px 42px rgba(0,0,0,0.45);
}

/* icon */
.profile-icon{
    font-size:95px;
    margin-bottom:18px;
    color:#60a5fa;
    transition:0.3s;
}

.profile-box:hover .profile-icon{
    transform:scale(1.08);
}

/* heading */
.profile-box h2{
    font-size:34px;
    font-weight:700;
    margin-bottom:6px;
    letter-spacing:0.5px;
}

.subtitle{
    font-size:18px;
    color:#d1d5db;
    margin-bottom:25px;
}

/* centered info */
.info-box{
    margin-top:25px;
    background:rgba(255,255,255,0.08);
    padding:25px;
    border-radius:18px;
    text-align:center;
}

.info-box p{
    font-size:19px;
    font-weight:500;
    margin-bottom:16px;
    letter-spacing:0.3px;
}

.info-box strong{
    color:#93c5fd;
    font-weight:600;
}

/* buttons */
.btn-custom{
    padding:12px 24px;
    border:none;
    border-radius:14px;
    font-weight:600;
    margin:12px 8px 0 8px;
    transition:0.3s;
}

.btn-custom:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 18px rgba(0,0,0,0.25);
}
</style>
</head>
<body>

<div class="overlay">

    <div class="profile-box">

        <div class="profile-icon">
            <i class="fa-solid fa-circle-user"></i>
        </div>

        <h2>{{ user.name }}</h2>
        <div class="subtitle">Resident Profile</div>

        <div class="info-box">
            <p><strong>Email:</strong> {{ user.email }}</p>
            <p><strong>Mobile:</strong> {{ user.phone }}</p>
            <p><strong>Flat No:</strong> {{ user.flat }}</p>
            <p><strong>Role:</strong> {{ user.role }}</p>
        </div>

        <a href="/resident/edit-profile">
            <button class="btn btn-success btn-custom">
                Edit Profile
            </button>
        </a>

        <a href="/resident/change-password">
            <button class="btn btn-warning btn-custom">
                Change Password
            </button>
        </a>

        <a href="/user/home">
            <button class="btn btn-secondary btn-custom">
                Back
            </button>
        </a>

    </div>

</div>

</body>
</html>
