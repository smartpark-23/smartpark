<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile | SmartPark</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    min-height:100vh;
    background:url("https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
    color:white;
    font-family:'Segoe UI', sans-serif;
}

/* overlay */
.overlay{
    min-height:100vh;
    background:rgba(0,0,0,0.65);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

/* modern glass card */
.form-box{
    width:100%;
    max-width:650px;
    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(18px);
    padding:40px;
    border-radius:24px;
    box-shadow:0 12px 35px rgba(0,0,0,0.35);
    transition:all 0.35s ease;
    border:1px solid rgba(255,255,255,0.12);
}

/* hover card effect */
.form-box:hover{
    transform:translateY(-6px) scale(1.01);
    box-shadow:0 18px 40px rgba(0,0,0,0.45);
}

/* heading */
.title{
    font-size:30px;
    font-weight:700;
    margin-bottom:25px;
    text-align:center;
}

/* input */
.form-control{
    background:rgba(255,255,255,0.15);
    border:none;
    color:white;
    padding:14px 16px;
    border-radius:14px;
    margin-bottom:18px;
    transition:0.3s;
}

.form-control:focus{
    background:rgba(255,255,255,0.22);
    color:white;
    box-shadow:0 0 0 2px rgba(96,165,250,0.4);
}

.form-control::placeholder{
    color:#d1d5db;
}

/* buttons */
.btn-custom{
    padding:12px 22px;
    border:none;
    border-radius:14px;
    font-weight:600;
    margin-right:10px;
    transition:0.3s;
}

.btn-success:hover,
.btn-secondary:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 15px rgba(0,0,0,0.25);
}
</style>
</head>
<body>

<div class="overlay">

    <div class="form-box">

        <div class="title">✏️ Edit Profile</div>

        <form method="POST">

            <input type="text"
                   name="name"
                   class="form-control"
                   placeholder="Full Name"
                   value="{{ user.name }}"
                   required>

            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Email Address"
                   value="{{ user.email }}"
                   required>

            <input type="text"
                   name="phone"
                   class="form-control"
                   placeholder="Phone Number"
                   value="{{ user.phone }}"
                   required>

            <input type="text"
                   name="flat"
                   class="form-control"
                   placeholder="Flat Number"
                   value="{{ user.flat }}"
                   required>

            <button class="btn btn-success btn-custom">
                Update Profile
            </button>

            <a href="/resident/profile">
                <button type="button" class="btn btn-secondary btn-custom">
                    Back
                </button>
            </a>

        </form>

    </div>

</div>

</body>
</html>
