<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Vehicle</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
font-family:'Segoe UI';
background:url("https://images.unsplash.com/photo-1492144534655-ae79c964c9d7") center/cover no-repeat;
min-height:100vh;
}

.main{
padding:40px;
}

.form-box{
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:15px;
max-width:500px;
margin:auto;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.btn-save{
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
border:none;
}
</style>
</head>

<body>

<div class="main">

<div class="form-box">

<h4>Add Vehicle</h4>

<form method="POST" action="/user/add_vehicle">

<!-- ✅ Vehicle Number -->
<input class="form-control mb-3" name="vehicle_number" placeholder="Vehicle Number" required>

<!-- ✅ Vehicle Name -->
<input class="form-control mb-3" name="vehicle_name" placeholder="Vehicle Name" required>

<!-- ✅ Owner Name -->
<input class="form-control mb-3" id="owner_name" name="owner_name" placeholder="Owner Name" required>

<!-- ✅ Flat -->
<select class="form-control mb-3" id="flat" name="flat" required>
<option value="">Select Flat</option>
</select>

<!-- ✅ Vehicle Type -->
<select class="form-control mb-3" name="vehicle_type">
<option value="Car">Car</option>
<option value="Bike">Bike</option>
</select>

<!-- ✅ Model -->
<input class="form-control mb-3" name="model" placeholder="Model">

<!-- ✅ Color -->
<input class="form-control mb-3" name="color" placeholder="Color">

<!-- 🔘 Buttons -->
<div class="d-flex justify-content-between">
    <a href="/user/vehicles" class="btn btn-secondary">⬅ Back</a>
    <button class="btn btn-save">Save Vehicle</button>
</div>

</form>

</div>

</div>

<!-- 🔥 JS for dynamic flat -->
<script>
document.getElementById("owner_name").addEventListener("blur", function(){

    let owner = this.value;

    fetch(`/get-flat?owner_name=${owner}`)
    .then(res => res.json())
    .then(data => {

        let flatDropdown = document.getElementById("flat");
        flatDropdown.innerHTML = "";

        if(data.flat){
            flatDropdown.innerHTML = `<option value="${data.flat}">${data.flat}</option>`;
        }else{
            flatDropdown.innerHTML = `<option>No Flat Found</option>`;
        }
    });

});
</script>

</body>
</html>
