<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMARTPARK | Guest Parking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:url("https://images.unsplash.com/photo-1506521781263-d8422e82f27a?auto=format&fit=crop&w=1600&q=80") no-repeat center center/cover;
    min-height:100vh;
    font-family:'Segoe UI';
    position:relative;
    color:white;
}

/* DARK OVERLAY */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.65);
    z-index:0;
}

.wrapper{
    position:relative;
    z-index:1;
}

/* TOP BAR */
.top-bar{
    display:flex;
    justify-content:flex-end;
    padding:20px 30px;
}

/* BACK BUTTON */
.btn-back{
    background:rgba(255,255,255,0.12);
    color:white;
    border:1px solid rgba(255,255,255,0.25);
    backdrop-filter:blur(10px);
    padding:10px 18px;
    border-radius:12px;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
}

.btn-back:hover{
    background:white;
    color:#16a34a;
}

/* FORM SECTION */
.form-section{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:calc(100vh - 80px);
    padding:20px;
}

/* FORM BOX */
.form-box{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(18px);
    padding:35px;
    border-radius:25px;
    width:100%;
    max-width:600px;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

/* TITLE */
.form-title{
    font-size:28px;
    font-weight:700;
    margin-bottom:20px;
    text-align:center;
}

/* INPUT */
.form-control{
    background:rgba(255,255,255,0.15);
    border:none;
    color:white;
    padding:14px;
    border-radius:12px;
}

.form-control::placeholder{
    color:#e5e7eb;
}

.form-control:focus{
    background:rgba(255,255,255,0.2);
    color:white;
    box-shadow:none;
}

/* SLOT BOX */
.slot-box{
    background:rgba(255,255,255,0.08);
    padding:18px;
    border-radius:15px;
    margin-bottom:20px;
}

.form-check{
    margin-bottom:10px;
}

.form-check-label{
    color:white;
    margin-left:8px;
}

/* BUTTON */
.btn-send{
    background:#22c55e;
    color:white;
    font-weight:600;
    border:none;
    padding:14px;
    border-radius:12px;
    transition:0.3s;
}

.btn-send:hover{
    background:#16a34a;
    transform:translateY(-2px);
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- BACK BUTTON -->
    <div class="top-bar">
        <a href="/user/home" class="btn-back">⬅ Back</a>
    </div>

    <!-- FORM -->
    <div class="form-section">
        <div class="form-box">

            <div class="form-title">
                🚗 Guest Parking Request
            </div>

            <form method="POST">

                <input type="text" name="guest_name"
                    class="form-control mb-3"
                    placeholder="Guest Name" required>

                <input type="text" name="mobile_number"
                    class="form-control mb-3"
                    placeholder="Mobile Number" required>

                <input type="text" name="vehicle_number"
                    class="form-control mb-3"
                    placeholder="Vehicle Number" required>

                <input type="text" name="resident_name"
                    class="form-control mb-3"
                    placeholder="Resident Name / Flat No" required>

                <input type="date" name="visit_date"
                    class="form-control mb-3" required>

                <label class="mb-2">Select Available Slots</label>

                <div class="slot-box">

                    {% if free_slots %}
                        {% for slot in free_slots %}
                            <div class="form-check">
                                <input class="form-check-input"
                                    type="checkbox"
                                    name="selected_slots"
                                    value="{{ slot.slot_number }}"
                                    id="{{ slot.slot_number }}">

                                <label class="form-check-label"
                                    for="{{ slot.slot_number }}">
                                    {{ slot.slot_number }}
                                    ({{ slot.slot_type }})
                                </label>
                            </div>
                        {% endfor %}
                    {% else %}
                        <p>No slots available</p>
                    {% endif %}

                </div>

                <button class="btn btn-send w-100">
                    Send Request
                </button>

            </form>

        </div>
    </div>

</div>

</body>
</html>
