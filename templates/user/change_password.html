<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password | SmartPark</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    min-height:100vh;
    background:url("https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
    color:white;
}

.overlay{
    min-height:100vh;
    background:rgba(0,0,0,0.65);
    padding:40px;
}

.form-box{
    max-width:650px;
    margin:auto;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(14px);
    padding:35px;
    border-radius:22px;
    box-shadow:0 8px 25px rgba(0,0,0,0.35);
}

.form-control{
    margin-bottom:15px;
}

.btn-custom{
    padding:12px 22px;
    border:none;
    border-radius:12px;
    font-weight:600;
    margin-right:10px;
}
</style>
</head>
<body>

<div class="overlay">

    <div class="form-box">

        <h2 class="mb-4">Change Password</h2>

        <form method="POST">

            <input type="password" name="old_password"
                   class="form-control"
                   placeholder="Enter Old Password"
                   required>

            <input type="password" name="new_password"
                   class="form-control"
                   placeholder="Enter New Password"
                   required>

            <input type="password" name="confirm_password"
                   class="form-control"
                   placeholder="Confirm New Password"
                   required>

            <button class="btn btn-success btn-custom">
                Update Password
            </button>

            <a href="/resident/profile">
                <button type="button" class="btn btn-secondary btn-custom">
                    Back
                </button>
            </a>

        </form>

        {% if error %}
            <div class="alert alert-danger mt-3">
                {{ error }}
            </div>
        {% endif %}

    </div>

</div>

</body>
</html>
