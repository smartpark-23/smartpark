<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Vehicles</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
font-family:'Segoe UI';
background:url("https://images.unsplash.com/photo-1493238792000-8113da705763") center/cover no-repeat;
min-height:100vh;
position:relative;
}

/* DARK OVERLAY */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:0;
}

/* MAIN */
.main{
padding:40px;
position:relative;
z-index:1;
color:white;
max-width:1000px;
margin:auto;
}

/* BOX */
.box{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* BUTTON */
.btn-add{
background:linear-gradient(135deg,#6366f1,#8b5cf6);
color:white;
border:none;
border-radius:25px;
padding:8px 18px;
transition:0.3s;
}

.btn-add:hover{
transform:scale(1.05);
box-shadow:0 0 15px rgba(139,92,246,0.7);
}

/* BACK BUTTON */
.btn-back{
background:#ffffff;
color:black;
border-radius:20px;
padding:6px 15px;
}

/* TABLE */
.table{
color:white;
}

.table th{
background:rgba(255,255,255,0.2);
}

.table tbody tr:hover{
background:rgba(99,102,241,0.3);
}

/* DELETE BUTTON */
.btn-danger{
border-radius:8px;
transition:0.3s;
}

.btn-danger:hover{
transform:scale(1.1);
box-shadow:0 0 10px rgba(239,68,68,0.8);
}

</style>
</head>

<body>

<!-- MAIN -->
<div class="main">

<div class="d-flex justify-content-between align-items-center mb-3">

<a href="/user/home" class="btn btn-back">
<i class="fa fa-arrow-left"></i> Back
</a>

<h4 class="m-0">🚗 My Vehicles</h4>

<a href="/user/add_vehicle" class="btn btn-add">
<i class="fa fa-plus"></i> Add Vehicle
</a>

</div>

<div class="box">

<table class="table table-hover text-center align-middle">

<thead>
<tr>
<th>Vehicle Number</th>
<th>Vehicle Name</th>
<th>Type</th>
<th>Model</th>
<th>Color</th>
<th>Action</th>
</tr>
</thead>

<tbody>

{% if vehicles %}
    {% for v in vehicles %}
    <tr>
        <td>{{ v.vehicle_number }}</td>
        <td>{{ v.vehicle_name }}</td>
        <td>{{ v.vehicle_type }}</td>
        <td>{{ v.model }}</td>
        <td>{{ v.color }}</td>

        <td>
            <a href="/user/delete_vehicle/{{ v._id }}" 
               class="btn btn-danger btn-sm"
               onclick="return confirm('Delete this vehicle?')">
                <i class="fa fa-trash"></i>
            </a>
        </td>
    </tr>
    {% endfor %}
{% else %}
    <tr>
        <td colspan="6" class="text-center">No vehicles added yet</td>
    </tr>
{% endif %}

</tbody>

</table>

</div>

</div>

</body>
</html>
