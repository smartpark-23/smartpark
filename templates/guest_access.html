<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMARTPARK | Track Request</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    min-height:100vh;
    background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
    position:relative;
    color:white;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.65);
    z-index:0;
}

.wrapper{
    position:relative;
    z-index:1;
    min-height:100vh;
}

/* NAVBAR */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    padding:18px 40px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(14px);
}

.logo{
    font-size:28px;
    font-weight:700;
}

.nav-links a{
    text-decoration:none;
    color:white;
    margin:8px 10px;
    padding:8px 15px;
    border-radius:12px;
    display:inline-block;
}

.nav-links a:hover{
    background:rgba(255,255,255,0.12);
}

/* FORM */
.form-section{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:calc(100vh - 80px);
    padding:20px;
}

.form-box{
    width:100%;
    max-width:450px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(18px);
    padding:35px 25px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.form-title{
    font-size:32px;
    font-weight:700;
    margin-bottom:20px;
}

.form-control{
    background:rgba(255,255,255,0.15);
    border:none;
    color:white;
    padding:14px;
    border-radius:12px;
    margin-bottom:15px;
}

.form-control::placeholder{
    color:#e5e7eb;
}

.form-control:focus{
    background:rgba(255,255,255,0.2);
    color:white;
    box-shadow:none;
}

/* BUTTON */
.btn-check{
    width:100%;
    padding:15px;
    font-size:18px;
    font-weight:700;
    border:none;
    border-radius:12px;
    color:white;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    cursor:pointer;
    transition:0.3s;
}

.btn-check:hover{
    transform:translateY(-3px);
}

/* ERROR */
.error-box{
    margin-top:15px;
    padding:12px;
    border-radius:12px;
    background:rgba(239,68,68,0.25);
    color:white;
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- NAVBAR -->
    <div class="header">
        <div class="logo">SMARTPARK</div>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/slots">Slots</a>
            <a href="/guest-parking">Guest Parking</a>
            <a href="/guest-access">Track Request</a>
            <a href="/login">Login</a>
            <a href="/register" class="register-btn">Register</a>
        </div>
    </div>

    <!-- FORM -->
    <div class="form-section">

        <div class="form-box">

            <div class="form-title">
                🔍 Track Request
            </div>

            <form method="POST">

                <input type="text"
                       name="mobile_number"
                       class="form-control"
                       placeholder="Enter Mobile Number"
                       required>

                <input type="text"
                       name="vehicle_no"
                       class="form-control"
                       placeholder="Enter Vehicle Number"
                       required>

                <button type="submit" class="btn-check">
                    Check Status
                </button>

            </form>

            {% if error %}
            <div class="error-box">
                {{ error }}
            </div>
            {% endif %}

        </div>

    </div>

</div>

</body>
</html>
