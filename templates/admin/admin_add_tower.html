<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Tower</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:'Segoe UI';
background:url("https://images.unsplash.com/photo-1486406146926-c627a92ad1ab") center/cover no-repeat;
min-height:100vh;
}

.main{
padding:40px;
}

.btn-back{
background:linear-gradient(135deg,#6c757d,#495057);
color:white;
border:none;
padding:8px 18px;
border-radius:8px;
transition:0.3s;
text-decoration:none;
}

.btn-back:hover{
transform:scale(1.05);
background:linear-gradient(135deg,#5a6268,#343a40);
color:white;
}

.form-box{
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:15px;
max-width:500px;
margin:auto;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.btn-save{
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
border:none;
}

.btn-save:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="main">

<div class="form-box">

<!-- 🔙 Header with Back -->
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Add Tower</h4>
    <a href="/admin/towers" class="btn btn-back">⬅ Back</a>
</div>

<form method="POST">

<input class="form-control mb-3" name="tower_name" placeholder="Tower Name" required>

<input class="form-control mb-3" name="total_floors" placeholder="Total Floors" required>

<input class="form-control mb-3" name="total_flats" placeholder="Total Flats" required>

<!-- 🔘 Only ONE Save button -->
<button class="btn btn-save w-100">Save Tower</button>

</form>

</div>

</div>

</body>
</html>
