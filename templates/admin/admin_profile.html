<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
font-family:'Segoe UI';
background:url("https://images.unsplash.com/photo-1521791136064-7986c2920216") center/cover no-repeat;
min-height:100vh;
position:relative;
}

/* 🔥 DARK OVERLAY */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:0;
}

/* SIDEBAR */
.sidebar{
height:100vh;
width:230px;
position:fixed;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding-top:25px;
z-index:1;
}

.sidebar h4{
text-align:center;
margin-bottom:30px;
color:white;
font-weight:600;
}

.sidebar a{
display:block;
padding:12px 20px;
margin:5px 10px;
border-radius:10px;
text-decoration:none;
color:white;
transition:0.3s;
}

.sidebar a:hover{
background:linear-gradient(135deg,#86b1e5,#7056ac);
box-shadow:0 0 12px rgba(99,102,241,0.8);
padding-left:25px;
}

/* TOPBAR */
.topbar{
margin-left:230px;
height:65px;
background:linear-gradient(135deg, #18181a, #2e2443, #270214);
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
position:relative;
z-index:1;
}

.topbar h5{
margin:0;
font-weight:600;
}

/* MAIN */
.main{
margin-left:230px;
padding:40px;
display:flex;
justify-content:center;
align-items:center;
position:relative;
z-index:1;
}

/* PROFILE CARD */
.profile-card{
width:420px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:25px;
padding:30px;
text-align:center;
box-shadow:0 10px 35px rgba(0,0,0,0.4);
color:white;
transition:0.3s;
}

.profile-card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 0 30px rgba(99,102,241,0.7);
}

/* PROFILE IMAGE */
.profile-img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
margin-bottom:15px;
transition:0.3s;
}

.profile-img:hover{
transform:scale(1.1);
box-shadow:0 0 20px rgba(255,255,255,0.7);
}

/* BUTTON */
.btn-edit{
background:linear-gradient(135deg,#6366f1,#8b5cf6);
color:white;
border:none;
padding:10px 25px;
border-radius:25px;
transition:0.3s;
font-weight:500;
}

.btn-edit:hover{
transform:scale(1.05);
box-shadow:0 0 15px rgba(139,92,246,0.8);
}

/* INFO */
.info{
text-align:left;
margin-top:20px;
}

.info p{
margin:10px 0;
font-weight:500;
display:flex;
align-items:center;
gap:10px;
}

.info i{
color:#c4b5fd;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<h4>🚗 SmartPark</h4>

<a href="/admin/dashboard"><i class="fa fa-home"></i> Dashboard</a>
<a href="/admin/residents"><i class="fa fa-users"></i> Residents</a>
<a href="/admin/vehicles"><i class="fa fa-car"></i> Vehicles</a>
<a href="/admin/towers"><i class="fa fa-building"></i> Towers</a>
<a href="/admin/parking_slots"><i class="fa fa-square-parking"></i> Parking Slots</a>
<a href="/admin/guest_requests"><i class="fa fa-user-clock"></i> Guest Requests</a>
<a href="/admin/reports"><i class="fa fa-chart-line"></i> Reports</a>
<a href="/admin/profile"><i class="fa fa-user"></i> Profile</a>
<a href="/logout"><i class="fa fa-sign-out"></i> Logout</a>

</div>

<!-- TOPBAR -->
<div class="topbar">
<h5>Admin Profile</h5>
<div>Welcome {{ admin.name }}</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="profile-card">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="profile-img">

<h4>{{ admin.name }}</h4>
<p class="text-light">System Administrator</p>

<a href="/admin/profile/edit" class="btn btn-edit mb-3">
<i class="fa fa-edit"></i> Edit Profile
</a>

<div class="info">
<p><i class="fa fa-envelope"></i> {{ admin.email }}</p>
<p><i class="fa fa-user-shield"></i> Role: Admin</p>
<p><i class="fa fa-phone"></i> {{ admin.phone }}</p>
<p><i class="fa fa-location-dot"></i> {{ admin.location }}</p>
</div>

</div>

</div>

</body>
</html>
