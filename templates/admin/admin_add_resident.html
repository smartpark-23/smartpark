<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Resident</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:'Segoe UI';
background:url("https://images.unsplash.com/photo-1503376780353-7e6692767b70") center/cover no-repeat;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.form-box{
background:rgba(255,255,255,0.95);
padding:30px;
border-radius:15px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
width:400px;
}

.btn-save{
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
border:none;
}

.btn-save:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="form-box">

<h4 class="mb-3">Add Resident</h4>

<form method="POST">

<input class="form-control mb-3" name="name" placeholder="Name" required>
<input class="form-control mb-3" name="email" placeholder="Email" required>
<input class="form-control mb-3" name="phone" placeholder="Phone" required>

<!-- 🔽 Flat Dropdown -->
<select class="form-control mb-3" name="flat" required>
<option value="">Select Flat</option>
{% for f in flats %}
<option value="{{ f }}">{{ f }}</option>
{% endfor %}
</select>

<div class="d-flex justify-content-between">
    <a href="/admin/residents" class="btn btn-secondary">⬅ Back</a>
    <button class="btn btn-save">Save</button>
</div>

</form>

</div>

</body>
</html>
