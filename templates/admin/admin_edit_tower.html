<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Tower</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:'Segoe UI';
background:url("https://images.unsplash.com/photo-1486406146926-c627a92ad1ab") center/cover no-repeat;
min-height:100vh;
}

.main{
padding:40px;
}

.form-box{
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:15px;
max-width:500px;
margin:auto;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.btn-update{
background:#22c55e;
color:white;
border:none;
}

.btn-update:hover{
opacity:0.9;
}

</style>
</head>

<body>

<div class="main">

<div class="form-box">

<h4>Edit Tower</h4>

<form method="POST">

<input class="form-control mb-3" name="tower_name" value="{{ tower.tower_name }}">

<input class="form-control mb-3" name="total_floors" value="{{ tower.total_floors }}">

<input class="form-control mb-3" name="total_flats" value="{{ tower.total_flats }}">

<button class="btn btn-update w-100">Update Tower</button>

</form>

</div>

</div>

</body>
</html>
