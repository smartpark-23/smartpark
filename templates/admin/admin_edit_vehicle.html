<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Vehicle</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:'Segoe UI';
background:url("https://images.unsplash.com/photo-1492144534655-ae79c964c9d7") center/cover no-repeat;
min-height:100vh;
}

.main{
padding:40px;
}

.form-box{
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:15px;
max-width:500px;
margin:auto;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.btn-save{
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
border:none;
}

</style>
</head>

<body>

<div class="main">

<div class="form-box">

<h4>Edit Vehicle</h4>

<form method="POST">

<!-- ✅ Vehicle Number -->
<input class="form-control mb-3" name="vehicle_number"
       value="{{ vehicle.vehicle_number }}" required>

<!-- ✅ Vehicle Name -->
<input class="form-control mb-3" name="vehicle_name"
       value="{{ vehicle.vehicle_name }}" required>

<!-- ✅ Owner Name -->
<input class="form-control mb-3" id="owner_name" name="owner_name"
       value="{{ vehicle.owner_name }}" required>


<!-- ✅ Vehicle Type -->
<select class="form-control mb-3" name="vehicle_type">
    <option value="Car" {% if vehicle.vehicle_type == "Car" %}selected{% endif %}>Car</option>
    <option value="Bike" {% if vehicle.vehicle_type == "Bike" %}selected{% endif %}>Bike</option>
</select>

<!-- ✅ Model -->
<input class="form-control mb-3" name="model"
       value="{{ vehicle.model }}">

<!-- ✅ Color -->
<input class="form-control mb-3" name="color"
       value="{{ vehicle.color }}">

<!-- 🔘 Buttons -->
<div class="d-flex justify-content-between">
    <a href="/admin/vehicles" class="btn btn-secondary">⬅ Back</a>
    <button class="btn btn-save">Update Vehicle</button>
</div>

</form>

</div>

</div>

<!-- 🔥 JS for dynamic flat -->
<script>
document.getElementById("owner_name").addEventListener("blur", function(){

    let owner = this.value;

    fetch(`/get-flat?owner_name=${owner}`)
    .then(res => res.json())
    .then(data => {

        let flatDropdown = document.getElementById("flat");
        flatDropdown.innerHTML = "";

        if(data.flat){
            flatDropdown.innerHTML = `<option value="${data.flat}">${data.flat}</option>`;
        }else{
            flatDropdown.innerHTML = `<option>No Flat Found</option>`;
        }
    });

});
</script>

</body>
</html>
