<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Resident</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:'Segoe UI';
background:url("https://images.unsplash.com/photo-1503376780353-7e6692767b70") center/cover no-repeat;
min-height:100vh;
}

.main{
padding:30px;
}

.form-box{
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:15px;
max-width:500px;
margin:auto;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.btn-update{
background:#22c55e;
color:white;
border:none;
}

.btn-update:hover{
opacity:0.8;
}

</style>
</head>

<body>

<div class="main">

<div class="form-box">

<h4>Edit Resident</h4>

<form method="POST">

<input class="form-control mb-3" name="name" value="{{ user.name }}">
<input class="form-control mb-3" name="email" value="{{ user.email }}">
<input class="form-control mb-3" name="phone" value="{{ user.phone }}">
<input class="form-control mb-3" name="flat" value="{{ user.flat }}">

<button class="btn btn-update">Update</button>

</form>

</div>

</div>

</body>
</html>
