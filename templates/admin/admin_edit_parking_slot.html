<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Parking Slot</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:'Segoe UI';
background:url("https://images.unsplash.com/photo-1506521781263-d8422e82f27a") center/cover no-repeat;
min-height:100vh;
}

.main{
padding:40px;
}

.form-box{
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:15px;
max-width:500px;
margin:auto;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.btn-update{
background:#22c55e;
color:white;
border:none;
}

.btn-update:hover{
opacity:0.9;
}

</style>
</head>

<body>

<div class="main">

<div class="form-box">

<h4>Edit Parking Slot</h4>

<form method="POST">

<input class="form-control mb-3" name="slot_number" value="{{ slot.slot_number }}">

<input class="form-control mb-3" name="tower" value="{{ slot.tower }}">

<input class="form-control mb-3" name="floor" value="{{ slot.floor }}">

<select class="form-control mb-3" name="slot_type">
<option {% if slot.slot_type=="Car" %}selected{% endif %}>Car</option>
<option {% if slot.slot_type=="Bike" %}selected{% endif %}>Bike</option>
</select>

<select class="form-control mb-3" name="status">
<option value="available" {% if slot.status=="available" %}selected{% endif %}>Available</option>
<option value="occupied" {% if slot.status=="occupied" %}selected{% endif %}>Occupied</option>
</select>
<select class="form-control mb-3" name="user_name">
<option value="">-- Select Resident --</option>

{% for user in residents %}
<option value="{{ user.name }}" 
{% if slot.user_name == user.name %}selected{% endif %}>
{{ user.name }}
</option>
{% endfor %}

</select>

<button class="btn btn-update w-100">Update Slot</button>

</form>

</div>

</div>

</body>
</html>
