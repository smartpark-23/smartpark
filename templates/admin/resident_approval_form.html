<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resident Approval</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:'Segoe UI';
background:url("https://images.unsplash.com/photo-1506521781263-d8422e82f27a") center/cover no-repeat;
min-height:100vh;
}

.main{
padding:40px;
}

.btn-back{
background:linear-gradient(135deg,#6c757d,#495057);
color:white;
padding:8px 18px;
border-radius:8px;
text-decoration:none;
transition:0.3s;
}

.btn-back:hover{
transform:scale(1.05);
background:linear-gradient(135deg,#5a6268,#343a40);
color:white;
}

.form-box{
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:15px;
max-width:500px;
margin:auto;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.btn-send{
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
border:none;
}

.btn-send:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="main">
<div class="form-box">

<div class="d-flex justify-content-between align-items-center mb-3">
<h4 class="mb-0">Resident Approval Request</h4>
<a href="/admin/guest_requests" class="btn btn-back">⬅ Back</a>
</div>

<form method="POST" action="/resident/send_request">

<!-- 🔥 Hidden ID -->
<input type="hidden" name="guest_id" value="{{ guest._id if guest else '' }}">

<!-- Guest Name -->
<div class="mb-3">
<label>Guest Name</label>
<input type="text" class="form-control"
value="{{ guest.guest_name if guest else 'Not Found' }}" readonly>
</div>

<!-- Vehicle Number -->
<div class="mb-3">
<label>Vehicle Number</label>
<input type="text" class="form-control"
value="{{ guest.vehicle_no if guest else 'Not Found' }}" readonly>
</div>

<!-- 🔥 Resident (AUTO SELECTED) -->
<div class="mb-3">
<label>Resident</label>

<select class="form-control" name="resident_name" required>

<!-- ✅ ONLY ONE VALUE -->
<option value="{{ guest.resident_name }}">
    {{ guest.resident_name }}
</option>

</select>

</div>

<button class="btn btn-send w-100">Send Approval Request</button>

</form>

</div>
</div>

</body>
</html>
