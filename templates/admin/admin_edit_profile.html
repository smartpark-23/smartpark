<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
font-family:'Segoe UI';
background:url("https://images.unsplash.com/photo-1521791136064-7986c2920216") center/cover no-repeat;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

/* 🔥 Overlay */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:0;
}

/* FORM BOX */
.form-box{
position:relative;
z-index:1;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:35px;
border-radius:20px;
width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
color:white;
transition:0.3s;
}

/* 🔥 Hover effect */
.form-box:hover{
transform:translateY(-5px);
box-shadow:0 0 25px rgba(99,102,241,0.6);
}

/* TITLE */
.form-box h4{
font-weight:600;
}

/* INPUT */
.form-control{
background:rgba(255,255,255,0.2);
border:none;
color:white;
border-radius:10px;
padding:10px;
}

.form-control::placeholder{
color:#e5e7eb;
}

.form-control:focus{
background:rgba(255,255,255,0.3);
color:white;
box-shadow:none;
border:1px solid #6366f1;
}

/* BUTTON */
.btn-save{
background:linear-gradient(135deg,#6366f1,#8b5cf6);
color:white;
border:none;
border-radius:25px;
padding:10px;
font-weight:500;
transition:0.3s;
}

.btn-save:hover{
transform:scale(1.05);
box-shadow:0 0 15px rgba(139,92,246,0.8);
}

/* BACK BUTTON */
.btn-back{
background:transparent;
border:1px solid white;
color:white;
border-radius:25px;
transition:0.3s;
}

.btn-back:hover{
background:white;
color:#6366f1;
}

</style>
</head>

<body>

<div class="form-box">

<h4 class="text-center mb-4">✏️ Edit Profile</h4>

<form method="POST">

<input type="text" name="name" class="form-control mb-3" placeholder="Name" value="{{ admin.name }}">

<input type="email" name="email" class="form-control mb-3" placeholder="Email" value="{{ admin.email }}">

<input type="text" name="phone" class="form-control mb-3" placeholder="Phone" value="{{ admin.phone }}">

<input type="text" name="location" class="form-control mb-3" placeholder="Location" value="{{ admin.location }}">

<!-- 🔘 Buttons -->
<div class="d-flex justify-content-between mt-3">
    <a href="/admin/profile" class="btn btn-back px-4">⬅ Back</a>
    <button class="btn btn-save px-4">Update</button>
</div>

</form>

</div>

</body>
</html>
