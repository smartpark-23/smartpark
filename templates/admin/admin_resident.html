<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Residents</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
font-family:'Segoe UI',sans-serif;
background:url("https://images.unsplash.com/photo-1501183638710-841dd1904471") center/cover no-repeat;
min-height:100vh;
position:relative;
}

/* 🔥 Overlay */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:0;
}

/* SIDEBAR */
.sidebar{
height:100vh;
width:230px;
position:fixed;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding-top:25px;
z-index:1;
}

.sidebar h4{
text-align:center;
margin-bottom:30px;
color:white;
}

.sidebar a{
display:block;
padding:12px 20px;
color:white;
text-decoration:none;
border-radius:8px;
margin:5px 10px;
transition:0.3s;
}

.sidebar a:hover{
background:linear-gradient(135deg,#86b1e5,#7056ac);
box-shadow:0 0 15px rgba(99,102,241,0.7);
padding-left:25px;
}

/* TOPBAR */
.topbar{
margin-left:230px;
height:65px;
background:linear-gradient(135deg, #18181a, #2e2443, #270214);
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
z-index:1;
position:relative;
}

/* MAIN */
.main{
margin-left:230px;
padding:30px;
position:relative;
z-index:1;
}

/* CARD */
.card-box{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
color:white;
}

/* ADD BUTTON */
.btn-add{
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
border:none;
border-radius:20px;
padding:8px 18px;
transition:0.3s;
}

.btn-add:hover{
transform:scale(1.05);
box-shadow:0 0 15px rgba(34,197,94,0.7);
}

/* TABLE */
.table{
color:white;
}

.table th{
background:rgba(255,255,255,0.2);
}

/* ROW HOVER */
.table tbody tr:hover{
background:rgba(99,102,241,0.3);
}

/* 🔥 MODERN EDIT BUTTON */
.btn-edit{
background:linear-gradient(135deg,#3b82f6,#6366f1);
color:white;
border:none;
border-radius:8px;
transition:0.3s;
}

.btn-edit:hover{
transform:scale(1.1);
box-shadow:0 0 10px rgba(59,130,246,0.8);
}

/* 🔥 MODERN DELETE BUTTON */
.btn-delete{
background:linear-gradient(135deg,#ef4444,#dc2626);
color:white;
border:none;
border-radius:8px;
transition:0.3s;
}

.btn-delete:hover{
transform:scale(1.1);
box-shadow:0 0 10px rgba(239,68,68,0.8);
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<h4>🚗 SmartPark</h4>

<a href="/admin/dashboard"><i class="fa fa-home"></i> Dashboard</a>
<a href="/admin/residents"><i class="fa fa-users"></i> Residents</a>
<a href="/admin/vehicles"><i class="fa fa-car"></i> Vehicles</a>
<a href="/admin/towers"><i class="fa fa-building"></i> Towers</a>
<a href="/admin/parking_slots"><i class="fa fa-square-parking"></i> Parking Slots</a>
<a href="/admin/guest_requests"><i class="fa fa-user-clock"></i> Guest Requests</a>
<a href="/admin/reports"><i class="fa fa-chart-line"></i> Reports</a>
<a href="/admin/profile"><i class="fa fa-user"></i> Profile</a>
<a href="/logout"><i class="fa fa-sign-out"></i> Logout</a>

</div>

<!-- TOPBAR -->
<div class="topbar">
<h5>Residents Management</h5>
<div>Admin</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="card-box">

<div class="d-flex justify-content-between mb-3">
<h4>All Residents</h4>

<a href="/admin/add_resident" class="btn btn-add">
<i class="fa fa-plus"></i> Add Resident
</a>
</div>

<table class="table table-hover">

<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Flat</th>
<th>Action</th>
</tr>
</thead>

<tbody>

{% for user in residents %}

<tr>
<td>{{ user.name }}</td>
<td>{{ user.email }}</td>
<td>{{ user.phone }}</td>
<td>{{ user.flat }}</td>

<td>
<a href="/admin/edit_resident/{{ user._id }}" class="btn btn-edit btn-sm">
<i class="fa fa-edit"></i>
</a>

<a href="/admin/delete_resident/{{ user._id }}" class="btn btn-delete btn-sm">
<i class="fa fa-trash"></i>
</a>
</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</body>
</html>
